name: Infrastructure Deploy

on:
  push:
    branches:
      - main
    paths:
      - '**.tf'
      - '**.tfvars'
      - '.github/workflows/infrastructure-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - Testing
          - Production

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'Testing' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=terraform_state" \
            -backend-config="storage_account_name=pdsgitstate${{ vars.TF_VAR_ENVIRONMENT }}" \
            -backend-config="container_name=gitstate" \
            -backend-config="key=${{ vars.TF_VAR_APPLICATION_NAME }}/terraform.gitstate"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="LOCATION=${{ vars.TF_VAR_LOCATION }}" \
            -var="ENVIRONMENT=${{ vars.TF_VAR_ENVIRONMENT }}" \
            -var="ENVIRONMENT_SHORT=${{ vars.TF_VAR_ENVIRONMENT_SHORT }}" \
            -var="APPLICATION_NAME=${{ vars.TF_VAR_APPLICATION_NAME }}" \
            -var="KEY_VAULT_NAME=${{ vars.TF_VAR_KEY_VAULT_NAME }}" \
            -out=tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_USE_OIDC: true
          TF_VAR_GITHUB_ACTIONS_OBJECT_ID: ${{ secrets.AZURE_OBJECT_ID }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_USE_OIDC: true
          TF_VAR_GITHUB_ACTIONS_OBJECT_ID: ${{ secrets.AZURE_OBJECT_ID }}

      - name: Display Outputs
        run: |
          echo "## Admin API Infrastructure Deployed" >> $GITHUB_STEP_SUMMARY
          IDENTITY_CLIENT_ID=$(terraform output -raw managed_identity_client_id 2>/dev/null || echo "N/A")
          echo "**Managed Identity Client ID:** $IDENTITY_CLIENT_ID" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Set this as AZURE_DEPLOYMENT_CLIENT_ID on the Admin API repo." >> $GITHUB_STEP_SUMMARY
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_USE_OIDC: true
